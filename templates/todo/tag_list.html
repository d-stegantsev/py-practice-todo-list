{% extends "base.html" %}

{% block content %}
  <div class="d-flex justify-content-between align-items-center mb-4">
    <h1 class="mb-0">Tags</h1>
    <a class="btn btn-primary" href="{% url 'todo:tag-create' %}">Add tag</a>
  </div>

  {% if tag_list %}
    <table class="table">
      <thead>
      <tr>
        <th>Name</th>
        <th>Update</th>
        <th>Delete</th>
      </tr>
      </thead>
      <tbody>
      {% for tag in tag_list %}
        <tr>
          <td>{{ tag.name }}</td>
          <td>
            <a class="btn btn-secondary btn-sm" href="{% url 'todo:tag-update' tag.pk %}">Update</a>
          </td>
          <td>
            <a class="btn btn-secondary btn-sm" href="{% url 'todo:tag-delete' tag.pk %}">Delete</a>
          </td>
        </tr>
      {% endfor %}
      </tbody>
    </table>
  {% else %}
    <p>There are no tags yet</p>
  {% endif %}
{% endblock %}
